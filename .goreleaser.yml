version: 2

project_name: cmux-resurrect

before:
  hooks:
    - go mod tidy
    - mkdir -p completions
    - sh -c "go run ./cmd/crex completion bash > completions/crex.bash"
    - sh -c "go run ./cmd/crex completion zsh  > completions/_crex"
    - sh -c "go run ./cmd/crex completion fish > completions/crex.fish"

builds:
  - id: crex
    binary: crex
    main: ./cmd/crex
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/drolosoft/cmux-resurrect/cmd.Version={{.Version}}
      - -X github.com/drolosoft/cmux-resurrect/cmd.Commit={{.ShortCommit}}
      - -X github.com/drolosoft/cmux-resurrect/cmd.Date={{.Date}}

archives:
  - id: default
    formats: ['tar.gz']
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - completions/*

checksum:
  name_template: "checksums.txt"

release:
  github:
    owner: drolosoft
    name: cmux-resurrect

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

brews:
  - repository:
      owner: drolosoft
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    name: cmux-resurrect
    homepage: "https://github.com/drolosoft/cmux-resurrect"
    description: "Terminal workspace manager for cmux and Ghostty — save, restore, and template your workspaces"
    license: "MIT"
    install: |
      bin.install "crex"
      bin.install_symlink "crex" => "cmux-resurrect"
      bash_completion.install "completions/crex.bash" => "crex"
      zsh_completion.install "completions/_crex"
      fish_completion.install "completions/crex.fish"
    test: |
      system "#{bin}/crex", "version"
      system "#{bin}/cmux-resurrect", "version"
