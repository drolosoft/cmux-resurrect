version: "2"

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gocritic
    - misspell

formatters:
  enable:
    - gofmt

linters-settings:
  gocritic:
    enabled-checks:
      - dupImport
      - ifElseChain
      - nestingReduce
      - unnecessaryBlock
  misspell:
    locale: US

issues:
  exclude-dirs:
    - testdata
  max-issues-per-linter: 50
  max-same-issues: 5

run:
  timeout: 5m
