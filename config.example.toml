# cmx configuration
# Copy to ~/.config/cmx/config.toml

# Workspace MD file (Obsidian vault or anywhere you like)
# workspace_file = "~/Library/Mobile Documents/iCloud~md~obsidian/Documents/cmux-workspaces.md"

# Directory where layout TOML files are stored
# layouts_dir = "~/.config/cmx/layouts"

# Auto-save interval for the watch command
watch_interval = "5m"

# Maximum number of rotated autosave files to keep
max_autosaves = 10
