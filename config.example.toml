# cmux-resurrect configuration
# Copy to ~/.config/crex/config.toml

# Workspace Blueprint file path (default: ~/.config/crex/workspaces.md)
# workspace_file = "~/.config/crex/workspaces.md"
#
# Example: use an Obsidian vault instead
# workspace_file = "~/Library/Mobile Documents/iCloud~md~obsidian/Documents/my-vault/workspaces.md"

# Directory where layout TOML files are stored
# layouts_dir = "~/.config/crex/layouts"

# Auto-save interval for the watch command
watch_interval = "5m"

# Maximum number of rotated autosave files to keep
max_autosaves = 10

# Banner style: "flame" (default), "classic", or "plain"
#   flame   — ember→gold→green gradient on the startup banner
#   classic — solid green, the traditional terminal look
#   plain   — monochrome gray, minimal and quiet
# Can also be set via CREX_BANNER env var (takes precedence over this).
# banner_style = "flame"
